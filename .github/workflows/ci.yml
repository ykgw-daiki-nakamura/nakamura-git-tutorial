name: CI

on:
  pull_request:

# GITHUB_TOKEN は読み取りのみに制限（既定の昇格を防ぐ）
permissions:
  contents: read

# 同一 PR へ連続 push した場合、進行中の古い実行をキャンセルして無駄を省く
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 通常は1分未満で完了。ハング時の暴走・課金を防ぐため上限を設定
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ビルドが通るかを検証（内部リンク切れ・Mermaid 構文エラーなどを検知）
      - name: Build with VitePress
        run: npm run docs:build

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Markdown の文体・整形の一貫性を検証
      - name: Lint Markdown
        run: npm run lint:md
