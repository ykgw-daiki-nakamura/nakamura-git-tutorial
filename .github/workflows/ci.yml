name: CI

on:
  pull_request:

# GITHUB_TOKEN は読み取りのみに制限（既定の昇格を防ぐ）
permissions:
  contents: read

# 同一 PR へ連続 push した場合、進行中の古い実行をキャンセルして無駄を省く
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 通常は1分未満で完了。ハング時の暴走・課金を防ぐため上限を設定
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # sidebar と実ファイルの双方向整合を検証（オーファン＝sidebar 未登録／死にリンク）
      - name: Check nav consistency
        run: npm run docs:check-nav

      # ビルドが通るかを検証（内部リンク切れ・Mermaid 構文エラーなどを検知）
      - name: Build with VitePress
        run: npm run docs:build

      # 手書きのページ内アンカーが実 HTML の id と一致するかを検証（docs:build の後に実行）
      - name: Check in-page anchors
        run: npm run check:anchors

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Markdown の文体・整形の一貫性を検証
      - name: Lint Markdown
        run: npm run lint:md

      # 日本語プロースの表記ゆれ・冗長表現を検証（textlint・段階導入）
      - name: Lint Japanese prose
        run: npm run lint:text

      # `**` が強調として描画されるかを検証（句読点に隣接すると成立しない CommonMark の規則）
      - name: Lint emphasis rendering
        run: npm run lint:emphasis

  # 設定駆動ハーネスの「設定↔実体」の整合を検査（checks.json スキーマ / hook 配線 / ラベル実在）
  config-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # (c) の `gh label list` は Issues API（ラベル）を読むため issues: read が必要。
    # これが無いと 403 で (c) が常時スキップされ、ラベル整合が検査されない。
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      # (a) checks.json スキーマ・(b) hook 配線・(c) ラベル実在（gh label list）を検査
      - name: Check config↔reality consistency
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run check:config

  # guard フック群の回帰テスト（.claude/hooks/lib/*.test.sh）を実行する。
  # ヒアドキュメント/引用内の誤検知・worktree 対応・secrets 走査などのデグレを PR で検知する。
  test-hooks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 明示的に最小権限を宣言（config-check ジョブと同じスタイル。ワークフロー既定も contents: read）
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # スケルトン判定（cmd-skeleton.js）に node が要る。テストは一時 git リポ/worktree を作る（git は同梱）。
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      # 一時リポジトリでのコミットに使う git ユーザーを用意する
      - name: Configure git identity
        run: |
          git config --global user.email ci@example.com
          git config --global user.name ci

      - name: Run hook regression tests
        run: npm run test:hooks

  # PR で新たに追加/更新される依存に既知の脆弱性が無いか検査する
  # （リポジトリの Dependency graph が有効である必要がある）
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # high 以上の脆弱性で失敗させる（しきい値は .github/security.json の audit.failOn と揃える）
          fail-on-severity: high

  # lockfile 全体の既知脆弱性を検査する。
  # dependency-review は **その PR で追加/更新された依存** しか見ないため、既に入っている依存に
  # 後から advisory が生えても検知できない。その穴をこのジョブが塞ぐ。
  # しきい値と期限付き allowlist は .github/security.json（scripts/check-audit.mjs が読む）。
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 明示的に最小権限を宣言（config-check ジョブと同じスタイル。ワークフロー既定も contents: read）
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # `npm audit` は package-lock.json とレジストリだけで動くため `npm ci` は不要（依存の導入を省く）
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Audit dependencies
        run: npm run check:audit
