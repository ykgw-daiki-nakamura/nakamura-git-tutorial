name: Link Check

# 外部リンクの死活を定期チェックする。
# ネットワーク/レート制限で不安定になりやすいため PR ゲートには含めず、
# 週次スケジュール + 手動実行に分離している。
on:
  schedule:
    # 毎週月曜 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check links with lychee
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # Markdown 内の外部リンク（http/https）のみ検査する。
          # VitePress は拡張子なしの内部リンク（例: ./branching）を許容するが、
          # lychee はこれをリテラルなファイルパスとして扱い誤検出するため、
          # --scheme で検査対象を http/https に限定して内部リンクを除外する。
          #
          # --root-dir はルート相対リンク（例: /standards/versioning）のために要る。
          # --scheme のフィルタが効くのは URL を組み立てられたリンクだけで、ルート相対
          # リンクは組み立ての時点で "To resolve root-relative links in local files,
          # provide a root dir" として失敗するため、フィルタに到達せずエラーになる。
          # 基準ディレクトリを docs/ に与えると file:// として解決でき、相対リンクと同じく
          # --scheme で除外される（内部リンクの死活は docs:build のデッドリンク検査が担保）。
          args: >-
            --no-progress
            --max-retries 3
            --retry-wait-time 2
            --timeout 20
            --scheme https
            --scheme http
            --root-dir ${{ github.workspace }}/docs
            './**/*.md'
          # 失敗してもステップ自体は通し、結果に応じて Issue を起票する
          fail: false

      # 既に open な link-check Issue があれば、それを更新して重複起票を防ぐ。
      # 週次で走るため、無条件に起票すると同じ内容の Issue が毎週 1 本ずつ積み上がる。
      - name: Find existing link-check issue
        id: existing
        if: steps.lychee.outputs.exit_code != 0
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          number=$(gh issue list --state open --label link-check --limit 1 \
            --json number --jq '.[0].number // empty')
          echo "number=${number}" >> "$GITHUB_OUTPUT"

      # issue-number が空なら新規作成、番号があればその Issue を更新する
      # （Number('') は 0 で falsy になるため、空文字は「未指定」として扱われる）。
      - name: Create or update issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          issue-number: ${{ steps.existing.outputs.number }}
          title: 'リンク切れを検出しました (Link Check)'
          content-filepath: ./lychee/out.md
          labels: link-check, automated
