name: Link Check

# 外部リンクの死活を定期チェックする。
# ネットワーク/レート制限で不安定になりやすいため PR ゲートには含めず、
# 週次スケジュール + 手動実行に分離している。
on:
  schedule:
    # 毎週月曜 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Check links with lychee
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # Markdown 内の外部リンク（http/https）のみ検査する。
          # VitePress は拡張子なしの内部リンク（例: ./branching）を許容するが、
          # lychee はこれをリテラルなファイルパスとして扱い誤検出するため、
          # --scheme で検査対象を http/https に限定して内部リンクを除外する。
          args: >-
            --no-progress
            --max-retries 3
            --retry-wait-time 2
            --timeout 20
            --scheme https
            --scheme http
            './**/*.md'
          # 失敗してもステップ自体は通し、結果に応じて Issue を起票する
          fail: false

      - name: Create issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: 'リンク切れを検出しました (Link Check)'
          content-filepath: ./lychee/out.md
          labels: link-check, automated
