name: Link Check

# 外部リンクの死活を定期チェックする。
# ネットワーク/レート制限で不安定になりやすいため PR ゲートには含めず、
# 週次スケジュール + 手動実行に分離している。
on:
  schedule:
    # 毎週月曜 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check links with lychee
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # Markdown 内のリンクを検査（一時障害に備えてリトライ）
          args: >-
            --no-progress
            --max-retries 3
            --retry-wait-time 2
            --timeout 20
            './**/*.md'
          # 失敗してもステップ自体は通し、結果に応じて Issue を起票する
          fail: false

      - name: Create issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@e8ef132d6df98ed982188e460ebb3b5d4ef3a9cd # v5.0.1
        with:
          title: 'リンク切れを検出しました (Link Check)'
          content-filepath: ./lychee/out.md
          labels: link-check, automated
