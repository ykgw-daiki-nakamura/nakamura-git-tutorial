name: PR Title

# Squash Merge 採用のため、マージ時のコミットメッセージ = PR タイトルになる。
# PR タイトルが Conventional Commits に準拠しているかを検証し、main の履歴を一貫させる。
#
# pull_request_target を使う理由（セキュリティ）:
#   フォーク PR が head 側の検証スクリプトや conventions.json を書き換えてチェックを回避できないよう、
#   検証ロジック（スクリプト・許可 type）は必ず **base（信頼できる）側**から評価する。
#   pull_request_target のリスク（昇格トークンで untrusted コードを実行）は、
#   (1) PR head のコードを一切チェックアウト・実行しない（base の sha のみ checkout）、
#   (2) 検証対象の PR タイトルは event payload の「データ」を env 経由で読むだけ、
#   (3) permissions を contents:read に絞る、ことで排除している。
on:
  pull_request_target:
    # opened/edited/reopened に加え synchronize（新コミット反映）も必須にする。
    # conventional-title は必須ステータスチェックで、GitHub は head コミット SHA ごとに
    # 評価する。synchronize が無いと新コミットの SHA にステータスが報告されず、
    # 必須チェックが "Waiting for status to be reported" のまま固まりマージがブロックされる。
    types: [opened, edited, reopened, synchronize]

# GITHUB_TOKEN は読み取りのみに制限（pull_request_target 既定の昇格を打ち消す）
permissions:
  contents: read

# 同一 PR へ連続イベントが来た場合、進行中の古い実行をキャンセルする
concurrency:
  group: pr-title-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    # 数秒で完了。ハング時の暴走・課金を防ぐため上限を設定
    timeout-minutes: 5
    steps:
      # base（PR のマージ先）の信頼できるツリーを checkout する。
      # PR head は checkout しない（untrusted なスクリプト/conventions.json を実行しないため）。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      # タイトルは env 経由で渡す（run へ直接展開しないことでスクリプトインジェクションを防ぐ）。
      # スクリプトと conventions.json は上でチェックアウトした base 側＝信頼できるもの。
      - name: Validate PR title (Conventional Commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: bash .github/scripts/check-pr-title.sh
