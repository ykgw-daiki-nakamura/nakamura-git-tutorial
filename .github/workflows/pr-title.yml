name: PR Title

# Squash Merge 採用のため、マージ時のコミットメッセージ = PR タイトルになる。
# PR タイトルが Conventional Commits に準拠しているかを検証し、main の履歴を一貫させる。
on:
  pull_request:
    # edited はタイトル編集を拾うために必須
    types: [opened, edited, synchronize, reopened]

# GITHUB_TOKEN は読み取りのみに制限
permissions:
  contents: read

# 同一 PR へ連続イベントが来た場合、進行中の古い実行をキャンセルする
concurrency:
  group: pr-title-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    # 数秒で完了。ハング時の暴走・課金を防ぐため上限を設定
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # タイトルは env 経由で渡す（run へ直接展開しないことでスクリプトインジェクションを防ぐ）
      - name: Validate PR title (Conventional Commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: bash .github/scripts/check-pr-title.sh
